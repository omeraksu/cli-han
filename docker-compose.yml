services:
  redis:
    image: redis:7-alpine
    container_name: han-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: han-postgres
    environment:
      POSTGRES_DB: han
      POSTGRES_USER: han
      POSTGRES_PASSWORD: han
    ports:
      - "5432:5432"
    volumes:
      - han-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U han -d han"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  han-pg:
